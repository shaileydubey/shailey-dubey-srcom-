.tab.on{background:#1e1b4b;color:#a78bfa;border-color:#4c1d95;font-weight:500}
.tab:hover:not(.on){background:#1e2130;color:#cbd5e1}
.main{display:flex;flex:1;overflow:hidden}
.left{width:270px;min-width:270px;border-right:1px solid #2d3148;overflow-y:auto;background:#0f1117}
.right{flex:1;overflow-y:auto;padding:20px 24px;background:#111827}
.layer-hdr{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:10px 14px 4px;color:#475569}
.fitem{padding:7px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;display:flex;align-items:flex-start;gap:8px}
.fitem:hover{background:#1e2130;border-left-color:#334155}
.fitem.sel{background:#1e1b4b;border-left-color:#7c3aed}
.fitem .fn{font-size:12px;font-family:'Courier New',monospace;color:#e2e8f0;line-height:1.3}
.fitem .fd{font-size:10px;color:#64748b;line-height:1.3;margin-top:1px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.empty{padding:60px 24px;text-align:center;color:#475569;font-size:13px;line-height:2}
.dd-title{font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.dd-path{font-size:11px;color:#475569;font-family:'Courier New',monospace;margin-bottom:14px}
.dd-purpose{font-size:13px;color:#94a3b8;background:#1a1d2e;border:1px solid #2d3148;border-radius:8px;padding:12px 14px;margin-bottom:16px;line-height:1.7}
.tree{font-family:'Courier New',monospace;font-size:12px;color:#cbd5e1;background:#0d1117;border:1px solid #2d3148;border-radius:8px;padding:16px 18px;line-height:1.9;white-space:pre;overflow-x:auto}
.hdr{color:#7c3aed;font-weight:600}
.fn-color{color:#818cf8}
.arrow{color:#475569}
.http{color:#34d399;font-weight:600}
.warn-color{color:#fbbf24}
.render-color{color:#60a5fa}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-family:sans-serif;font-weight:500}
.b-ok{background:#052e16;color:#4ade80;border:1px solid #166534}
.b-warn{background:#2d1b00;color:#fbbf24;border:1px solid #78350f}
.b-none{background:#1e2130;color:#64748b;border:1px solid #334155}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0f1117}
::-webkit-scrollbar-thumb{background:#2d3148;border-radius:3px}

// Route guard — validates token + role
//
// Functions/Methods -> ProtectedRoute({ role, children })
//
// ||---> Logic Flow:
//       |--- Read token from localStorage.getItem("token")
//       |--- Read user  from localStorage.getItem("user")

#
# Functions:
#   get_current_user(authorization: Header = Header(""))
#     |--- token = authorization.replace("Bearer ", "").strip()
#     |--- IF no token → raise 401
#     |--- jwt.decode(token, JWT_SECRET, algorithms=[JWT_ALGO])
#     |--- SELECT * FROM users WHERE id = payload["user_id"]
#     |--- Return dict(user)
#     |--- Raises 401: no token / expired / invalid / not found

#   require_admin(authorization)
#     |--- get_current_user()
#     └─── Raise 403 if user["role"] != "admin"
#
#   require_superuser(authorization)
#     └─── Raise 403 if user["role"] != "superuser"

#     |--- "today"      → today midnight
#     |--- "last_month" → now - 30 days
#     └─── default      → now - 7 days
#
# Endpoints:
#   GET /api/analytics/calls?period=last_week
#     |--- summary: total_calls, total_cost, avg_duration, total_issues
#     |--- chart:   daily COUNT grouped by DATE(created_at)
#     |--- outcomes: status counts (completed/voicemail/failed)
#     |--- duration_dist: <2min / 2-5min / >5min buckets
#     |--- cost_breakdown: AI 60% / telephony 25% / other 15%
#     └─── calls: full list ordered DESC
#
#   GET /api/analytics/reports?period=last_week
#     └─── total_calls, cost, avg_duration, success_rate, issues, chart
# ======================================================`},
    {name:"user.py",path:"backend/routes/user.py",status:"ok",desc:"User call logs endpoint",
     purpose:"Returns user's call logs with optional status filter. Used by CallLogsPage.",
     tree:`# ======================== user.py ========================
# User routes — call logs
#
# Auth: Depends(require_user)
#
# Endpoints:
#   GET /api/call-logs?status=all
#     |--- IF status != "all" → add WHERE status = %s
#     |--- SELECT id, call_id, direction, to_number AS phone_number,
#     |          from_number, duration_seconds AS duration,
#     |          cost, status, pathway, created_at
#     |--- WHERE user_id = current_user.id ORDER BY created_at DESC
#     |--- Stringify created_at
#     |--- Cast cost to float
#     └─── Return { calls: [...] }
# ======================================================`},
  ]},
];

let currentTag = 'all';
let selectedItem = null;

function filterTab(tag, el) {
  currentTag = tag;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderList();
}

function renderList() {
  const list = document.getElementById('tree-list');
  list.innerHTML = '';
  DOCS.forEach(layer => {
    const files = layer.files.filter(f =>
      currentTag === 'all' ||
      layer.tag === currentTag ||
      layer.tag === 'all' ||
      f.name.toLowerCase().includes(currentTag)
    );
    if (!files.length) return;
    const hdr = document.createElement('div');
    hdr.className = 'layer-hdr';
    hdr.textContent = layer.layer;
    list.appendChild(hdr);
    files.forEach(f => {
      const item = document.createElement('div');
      item.className = 'fitem';
      item.dataset.key = f.path;
      const dotColor = f.status === 'ok' ? '#4ade80' : f.status === 'warn' ? '#fbbf24' : '#475569';
      item.innerHTML = `<span class="dot" style="background:${dotColor}"></span>
        <div>
          <div class="fn">${f.name}</div>
          <div class="fd">${f.desc}</div>
        </div>`;
      item.onclick = () => showDetail(f, item);
      list.appendChild(item);
    });
  });
}

function showDetail(f, el) {
  if (selectedItem) selectedItem.classList.remove('sel');
  el.classList.add('sel');
  selectedItem = el;
  const badge = f.status === 'ok'
    ? '<span class="badge b-ok">connected</span>'
    : f.status === 'warn'
    ? '<span class="badge b-warn">partial</span>'
    : f.status
    ? '<span class="badge b-none">ui only</span>'
    : '';

  const highlighted = f.tree.split('\n').map(line => {
    if (line.includes('===')) return `<span style="color:#7c3aed;font-weight:600">${line}</span>`;
    if (line.match(/GET|POST|PUT|DELETE|DEL/)) return line.replace(/(GET|POST|PUT|DELETE|DEL)/g, '<span style="color:#34d399;font-weight:600">$1</span>');
    if (line.includes('MISSING') || line.includes('BUG') || line.includes('NOT IMPLEMENTED')) return `<span style="color:#fbbf24">${line}</span>`;
    if (line.includes('Returns') || line.includes('Renders') || line.includes('Exports')) return `<span style="color:#60a5fa">${line}</span>`;
    if (line.match(/\w+\(\)/)) return line.replace(/(\w+\(\w*\))/g, '<span style="color:#818cf8">$1</span>');
    return line;
  }).join('\n');

  document.getElementById('detail').innerHTML = `
    <div class="dd-title">${f.name} ${badge}</div>
    <div class="dd-path">${f.path}</div>
    <div class="dd-purpose">${f.purpose}</div>
    <div class="tree">${highlighted}</div>`;
}

renderList();
</script>
